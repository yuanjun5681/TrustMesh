<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 520" fill="none">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(139,127,248,0.08)" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-ws">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
      @keyframes dash { to { stroke-dashoffset: -20; } }
      @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
      @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
      @keyframes float3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
      @keyframes border-pulse { 0%,100%{opacity:.15} 50%{opacity:.35} }
      .pulse { animation: pulse 2.5s ease-in-out infinite; }
      .pulse-d { animation: pulse 2.5s ease-in-out infinite 0.8s; }
      .pulse-d2 { animation: pulse 2.5s ease-in-out infinite 1.6s; }
      .data-flow { stroke-dasharray: 8 12; animation: dash 1.5s linear infinite; }
      .data-flow-rev { stroke-dasharray: 8 12; animation: dash 1.5s linear infinite reverse; }
      .float1 { animation: float1 4s ease-in-out infinite; }
      .float2 { animation: float2 4.5s ease-in-out infinite 0.5s; }
      .float3 { animation: float3 3.8s ease-in-out infinite 1s; }
      .ws-border { animation: border-pulse 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background grid -->
  <rect width="560" height="520" fill="url(#grid)"/>

  <!-- ===== WORKSPACE CONTAINER ===== -->
  <!-- Outer glow border -->
  <rect x="30" y="50" width="500" height="420" rx="28" fill="none" stroke="#8b7ff8" stroke-width="1.5" class="ws-border" filter="url(#glow-ws)"/>
  <!-- Inner workspace background -->
  <rect x="30" y="50" width="500" height="420" rx="28" fill="rgba(139,127,248,0.03)" stroke="#8b7ff8" stroke-width="0.5" opacity="0.2"/>
  <!-- Workspace title bar -->
  <rect x="30" y="50" width="500" height="36" rx="28" fill="rgba(139,127,248,0.06)"/>
  <rect x="30" y="72" width="500" height="14" fill="rgba(139,127,248,0.06)"/>
  <!-- Title bar dots -->
  <circle cx="54" cy="68" r="3.5" fill="#ef4444" opacity="0.6"/>
  <circle cx="68" cy="68" r="3.5" fill="#f59e0b" opacity="0.6"/>
  <circle cx="82" cy="68" r="3.5" fill="#22c55e" opacity="0.6"/>
  <!-- Workspace label -->
  <text x="280" y="72" text-anchor="middle" fill="#8b7ff8" font-family="monospace" font-size="10" font-weight="bold" opacity="0.7">WORKSPACE</text>
  <!-- Corner markers -->
  <path d="M30 78 L30 50 Q30 50 58 50" fill="none" stroke="#8b7ff8" stroke-width="2" opacity="0.5"/>
  <path d="M530 78 L530 50 Q530 50 502 50" fill="none" stroke="#8b7ff8" stroke-width="2" opacity="0.5"/>
  <path d="M30 442 L30 470 Q30 470 58 470" fill="none" stroke="#8b7ff8" stroke-width="2" opacity="0.5"/>
  <path d="M530 442 L530 470 Q530 470 502 470" fill="none" stroke="#8b7ff8" stroke-width="2" opacity="0.5"/>

  <!-- Connection lines (data flow) — inside workspace -->
  <line x1="280" y1="270" x2="130" y2="155" stroke="#8b7ff8" stroke-width="1.5" class="data-flow" opacity="0.5"/>
  <line x1="280" y1="270" x2="430" y2="155" stroke="#8b7ff8" stroke-width="1.5" class="data-flow-rev" opacity="0.5"/>
  <line x1="280" y1="270" x2="110" y2="385" stroke="#8b7ff8" stroke-width="1.5" class="data-flow" opacity="0.5"/>
  <line x1="280" y1="270" x2="450" y2="385" stroke="#8b7ff8" stroke-width="1.5" class="data-flow-rev" opacity="0.5"/>
  <!-- Cross connections -->
  <line x1="130" y1="155" x2="110" y2="385" stroke="#6d5ff5" stroke-width="1" class="data-flow" opacity="0.2"/>
  <line x1="430" y1="155" x2="450" y2="385" stroke="#6d5ff5" stroke-width="1" class="data-flow-rev" opacity="0.2"/>
  <line x1="130" y1="155" x2="430" y2="155" stroke="#6d5ff5" stroke-width="1" class="data-flow" opacity="0.15"/>
  <line x1="110" y1="385" x2="450" y2="385" stroke="#6d5ff5" stroke-width="1" class="data-flow-rev" opacity="0.15"/>

  <!-- Particle dots on connections -->
  <circle cx="205" cy="212" r="2" fill="#8b7ff8" class="pulse"/>
  <circle cx="355" cy="212" r="2" fill="#8b7ff8" class="pulse-d"/>
  <circle cx="195" cy="328" r="2" fill="#8b7ff8" class="pulse-d2"/>
  <circle cx="365" cy="328" r="2" fill="#8b7ff8" class="pulse"/>

  <!-- ===== CENTER NODE: TrustMesh Hub ===== -->
  <g class="float1" filter="url(#glow-strong)">
    <circle cx="280" cy="270" r="44" fill="none" stroke="#8b7ff8" stroke-width="1.5" opacity="0.3" class="pulse"/>
    <rect x="248" y="238" width="64" height="64" rx="16" fill="#1a1140" stroke="#8b7ff8" stroke-width="2"/>
    <!-- Mesh icon -->
    <circle cx="268" cy="260" r="4" fill="#8b7ff8"/>
    <circle cx="292" cy="260" r="4" fill="#8b7ff8"/>
    <circle cx="280" cy="282" r="4" fill="#8b7ff8"/>
    <line x1="268" y1="260" x2="292" y2="260" stroke="#8b7ff8" stroke-width="1.5"/>
    <line x1="268" y1="260" x2="280" y2="282" stroke="#8b7ff8" stroke-width="1.5"/>
    <line x1="292" y1="260" x2="280" y2="282" stroke="#8b7ff8" stroke-width="1.5"/>
    <text x="280" y="322" text-anchor="middle" fill="#8b7ff8" font-family="monospace" font-size="11" font-weight="bold">TRUSTMESH</text>
  </g>

  <!-- ===== TOP-LEFT NODE: PM Agent ===== -->
  <g class="float2" filter="url(#glow)">
    <circle cx="130" cy="155" r="32" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.3" class="pulse-d"/>
    <rect x="104" y="129" width="52" height="52" rx="12" fill="#0f2918" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="130" cy="149" r="8" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <path d="M122 149c0-4.4 3.6-8 8-8s8 3.6 8 8" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
    <rect x="125" y="161" width="10" height="3" rx="1.5" fill="#22c55e"/>
    <rect x="123" y="166" width="14" height="3" rx="1.5" fill="#22c55e" opacity="0.6"/>
    <text x="130" y="200" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">PM AGENT</text>
    <circle cx="152" cy="133" r="4" fill="#22c55e" class="pulse"/>
  </g>

  <!-- ===== TOP-RIGHT NODE: Code Agent ===== -->
  <g class="float3" filter="url(#glow)">
    <circle cx="430" cy="155" r="32" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3" class="pulse"/>
    <rect x="404" y="129" width="52" height="52" rx="12" fill="#0c1929" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="430" y="161" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="18" font-weight="bold">&lt;/&gt;</text>
    <text x="430" y="200" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="9" font-weight="bold">CODE AGENT</text>
    <circle cx="452" cy="133" r="4" fill="#3b82f6" class="pulse-d"/>
  </g>

  <!-- ===== BOTTOM-LEFT NODE: Data Agent ===== -->
  <g class="float3" filter="url(#glow)">
    <circle cx="110" cy="385" r="32" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3" class="pulse-d2"/>
    <rect x="84" y="359" width="52" height="52" rx="12" fill="#1a1508" stroke="#f59e0b" stroke-width="1.5"/>
    <ellipse cx="110" cy="377" rx="10" ry="4" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <path d="M100 377v14c0 2.2 4.5 4 10 4s10-1.8 10-4v-14" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <path d="M100 384c0 2.2 4.5 4 10 4s10-1.8 10-4" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
    <text x="110" y="430" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9" font-weight="bold">DATA AGENT</text>
    <circle cx="132" cy="363" r="4" fill="#f59e0b" class="pulse"/>
  </g>

  <!-- ===== BOTTOM-RIGHT NODE: Test Agent ===== -->
  <g class="float2" filter="url(#glow)">
    <circle cx="450" cy="385" r="32" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.3" class="pulse"/>
    <rect x="424" y="359" width="52" height="52" rx="12" fill="#1a0818" stroke="#ec4899" stroke-width="1.5"/>
    <circle cx="450" cy="381" r="10" fill="none" stroke="#f472b6" stroke-width="1.5"/>
    <path d="M443 381l5 5 9-10" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="440" y="397" width="20" height="2" rx="1" fill="#ec4899" opacity="0.6"/>
    <rect x="442" y="401" width="16" height="2" rx="1" fill="#ec4899" opacity="0.4"/>
    <text x="450" y="430" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="9" font-weight="bold">TEST AGENT</text>
    <circle cx="472" cy="363" r="4" fill="#ec4899" class="pulse-d2"/>
  </g>

  <!-- Floating pixel particles inside workspace -->
  <rect x="60" y="230" width="3" height="3" fill="#8b7ff8" opacity="0.3" class="pulse"/>
  <rect x="490" y="230" width="3" height="3" fill="#8b7ff8" opacity="0.3" class="pulse-d"/>
  <rect x="210" y="100" width="3" height="3" fill="#22c55e" opacity="0.3" class="pulse-d2"/>
  <rect x="360" y="445" width="3" height="3" fill="#f59e0b" opacity="0.3" class="pulse"/>
  <rect x="50" y="320" width="2" height="2" fill="#3b82f6" opacity="0.2" class="pulse-d"/>
  <rect x="510" y="310" width="2" height="2" fill="#ec4899" opacity="0.2" class="pulse"/>
  <rect x="190" y="455" width="2" height="2" fill="#8b7ff8" opacity="0.2" class="pulse-d2"/>
  <rect x="400" y="95" width="2" height="2" fill="#6d5ff5" opacity="0.2" class="pulse"/>

  <!-- Bottom caption -->
  <text x="280" y="505" text-anchor="middle" fill="#8b7ff8" font-family="monospace" font-size="10" opacity="0.5">Agents collaborate in one workspace</text>
</svg>
